<div class="dropdown">
  <button
    class="dropdown__trigger"
    type="button"
    [class.dropdown__trigger--open]="isOpen()"
    (click)="toggle()"
  >
    {{ placeholder() }}
    <span
      class="dropdown__arrow"
      [class.dropdown__arrow--active]="isOpen() || selected()"
      [class.dropdown__arrow--up]="isOpen()"
    ></span>
  </button>

  @if (isOpen()) {
    <ul class="dropdown__menu">
      @if (resetLabel(); as label) {
        <li>
          <button class="dropdown__option" type="button" (click)="choose(null)">{{ label }}</button>
        </li>
      }

      @for (option of options(); track option) {
        <li>
          <button class="dropdown__option" type="button" (click)="choose(option)">{{ option }}</button>
        </li>
      }
    </ul>
  }

  @if (selected(); as category) {
    <p class="dropdown__selected">{{ category }}</p>
  }
</div>
