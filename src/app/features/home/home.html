<section class="hero container">
  <div class="hero__text">
    <h1 class="hero__headline">Collect Feedback,<br />Unlock Ideas</h1>
    <p class="hero__description">
      Create and share surveys in minutes – from team events to workplace culture. Collect
      opinions, engage your audience, and turn feedback into action.
    </p>
    <button class="button" type="button">New survey</button>
  </div>

  <div class="hero__visual">
    <img class="hero__card hero__card--default" src="card_1.svg" alt="" />
    <img class="hero__card hero__card--hover" src="card_2.svg" alt="" />
  </div>
</section>

<section class="surveys container">
  <h2 class="surveys__title">Your surveys</h2>

  <div class="highlights">
    <h3 class="highlights__title">Ending soon surveys</h3>

    <div class="highlights__row">
      @for (survey of endingSoon(); track survey.id) {
        <app-survey-card [survey]="survey" />
      }
    </div>
  </div>
</section>
