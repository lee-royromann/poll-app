<section class="create">
  <div class="panel">
    <header class="panel__head">
      <span class="tag">Draft</span>

      <div class="panel__row">
        <h1 class="panel__title">Create new survey</h1>

        <a class="cancel" routerLink="/">
          Cancel
          <img class="cancel__icon" src="close.svg" alt="" />
        </a>
      </div>
    </header>

    <div class="fields">
      <div class="fields__col">
        <div class="field">
          <label class="field__label" for="survey-name">Survey name</label>
          <div class="field__row">
            <input
              id="survey-name"
              class="input"
              [ngModel]="title()"
              (ngModelChange)="title.set($event)"
            />
            <button class="delete" type="button" (click)="title.set('')" aria-label="Clear survey name"></button>
          </div>
        </div>

        <div class="fields__inline">
          <div class="field">
            <label class="field__label" for="end-date">
              Set end date <span class="field__optional">(optional)</span>
            </label>
            <div class="field__row">
              <input
                id="end-date"
                class="input input--date"
                type="date"
                [ngModel]="endDate()"
                (ngModelChange)="endDate.set($event)"
              />
              <button class="delete" type="button" (click)="endDate.set('')" aria-label="Clear end date"></button>
            </div>
          </div>

          <app-category-dropdown
            placeholder="Choose category"
            [options]="categories"
            [selected]="category()"
            (selectionChange)="category.set($event)"
          />
        </div>
      </div>

      <div class="fields__col">
        <div class="field">
          <label class="field__label" for="description">
            Describing text <span class="field__optional">(optional)</span>
          </label>
          <div class="field__row">
            <textarea
              id="description"
              class="input input--area"
              [ngModel]="description()"
              (ngModelChange)="description.set($event)"
            ></textarea>
            <button class="delete" type="button" (click)="description.set('')" aria-label="Clear description"></button>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
