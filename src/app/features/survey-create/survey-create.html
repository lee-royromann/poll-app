<svg class="sprite" aria-hidden="true">
  <symbol id="icon-trash" viewBox="0 0 24 24">
    <path
      d="M5 7h14M10 4h4M9 7v11M15 7v11M6 7l1 13h10l1-13"
      stroke="currentColor"
      stroke-width="1.6"
      stroke-linecap="round"
      fill="none"
    />
  </symbol>
</svg>

<section class="create">
  <div class="panel">
    <header class="panel__head">
      <div class="panel__heading">
        <span class="tag">Draft</span>
        <h1 class="panel__title">Create new survey</h1>
      </div>

      <a class="cancel" routerLink="/">
        Cancel
        <svg class="cancel__icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
        </svg>
      </a>
    </header>

    <div class="fields">
      <div class="fields__col">
        <div class="field">
          <label class="field__label" for="survey-name">Survey name</label>
          <div class="field__row">
            <input
              id="survey-name"
              class="input"
              [ngModel]="title()"
              (ngModelChange)="title.set($event)"
            />
            <button class="delete" type="button" (click)="title.set('')" aria-label="Clear survey name">
              <svg class="delete__icon"><use href="#icon-trash" /></svg>
            </button>
          </div>
        </div>

        <div class="fields__inline">
          <div class="field">
            <label class="field__label" for="end-date">
              Set end date <span class="field__optional">(optional)</span>
            </label>
            <div class="field__row">
              <input
                id="end-date"
                class="input input--date"
                type="date"
                [ngModel]="endDate()"
                (ngModelChange)="endDate.set($event)"
              />
              <button class="delete" type="button" (click)="endDate.set('')" aria-label="Clear end date">
                <svg class="delete__icon"><use href="#icon-trash" /></svg>
              </button>
            </div>
          </div>

          <div class="field">
            <span class="field__label">Choose category</span>
            <div class="category">
              <button class="category__trigger" type="button" (click)="toggleCategory()">
                {{ category() ?? 'Choose category' }}
                <span class="category__arrow" [class.category__arrow--up]="isCategoryOpen()"></span>
              </button>

              @if (isCategoryOpen()) {
                <ul class="category__menu">
                  @for (option of categories; track option) {
                    <li>
                      <button class="category__option" type="button" (click)="selectCategory(option)">
                        {{ option }}
                      </button>
                    </li>
                  }
                </ul>
              }
            </div>
          </div>
        </div>
      </div>

      <div class="fields__col">
        <div class="field">
          <label class="field__label" for="description">
            Describing text <span class="field__optional">(optional)</span>
          </label>
          <div class="field__row">
            <textarea
              id="description"
              class="input input--area"
              [ngModel]="description()"
              (ngModelChange)="description.set($event)"
            ></textarea>
            <button class="delete" type="button" (click)="description.set('')" aria-label="Clear description">
              <svg class="delete__icon"><use href="#icon-trash" /></svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
